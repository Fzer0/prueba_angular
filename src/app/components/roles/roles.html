<div class="row">
    <!-- FORMULARIO ROLES -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <form>
                    <input type="hidden" name="idRol">

                    <div class="form-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Nombre del Rol"
                               name="nombreRol">
                    </div>

                    <div class="form-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Descripción del Rol"
                               name="descripcionRol">
                    </div>

                    <div class="form-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Estado del Rol"
                               name="estadoRol">
                    </div>

                    <div class="form-group">
                        <button type="button"
                                class="btn btn-primary mr-2 btn-sm">
                            Clean
                        </button>

                        <button type="submit"
                                class="btn btn-secondary btn-sm">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- TABLA ROLES -->
    <div class="col-md-8">
        <table class="table table-striped">
            <thead>
                <tr>
                    <td>Rol</td>
                    <td>Descripción</td>
                    <td>Estado</td>
                    <td>Operations</td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                        <button class="btn btn-secondary btn-sm">
                            <i class="material-symbols-outlined">edit</i>
                        </button>

                        <button class="btn btn-danger btn-sm">
                            <i class="material-symbols-outlined">delete</i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
